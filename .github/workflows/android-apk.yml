name: Build Android Debug APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;36.0.0'

      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.14.3-bin.zip
          unzip -q gradle-8.14.3-bin.zip -d /opt
          echo "/opt/gradle-8.14.3/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Generate Gradle wrapper
        working-directory: android
        run: gradle wrapper --gradle-version 8.14.3 --distribution-type all

      - name: Make Gradle wrapper executable
        working-directory: android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: finly-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
